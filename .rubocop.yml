# .rubocop.yml — Hopin Rails project
#
# Strategy: inherit rubocop-rails-omakase (DHH's opinionated Rails style),
# then override only the rules that conflict with this project's conventions.
#
# Run:      bundle exec rubocop
# Auto-fix: bundle exec rubocop -A   (safe fixes only)
# Unsafe:   bundle exec rubocop --autocorrect-all

inherit_gem:
  rubocop-rails-omakase: rubocop.yml

AllCops:
  NewCops: enable
  SuggestExtensions: false
  TargetRubyVersion: 3.4
  Exclude:
    - "db/schema.rb"            # auto-generated — style irrelevant
    - "db/migrate/**/*"         # migration style is intentionally loose
    - "bin/**/*"                # binstubs generated by Rails
    - "node_modules/**/*"
    - "vendor/**/*"
    - ".git/**/*"

# ── Style overrides ───────────────────────────────────────────────────────────

# frozen_string_literal comments add noise in a Rails 8 project where
# most objects are frozen by default via load_defaults 8.0 behaviour.
Style/FrozenStringLiteralComment:
  Enabled: false

# Omakase enforces double quotes; keep consistent with Rails generators.
Style/StringLiterals:
  EnforcedStyle: double_quotes

# Long blocks in RSpec/FactoryBot/ActiveAdmin DSLs are idiomatic — don't flag them.
Metrics/BlockLength:
  Exclude:
    - "spec/**/*"
    - "config/routes.rb"
    - "config/routes/**/*"
    - "app/admin/**/*"
    - "config/initializers/devise.rb"

# Allow longer methods in controllers and service objects.
Metrics/MethodLength:
  Max: 20

# Allow slightly longer class files (admin resources tend to be verbose).
Metrics/ClassLength:
  Max: 200

# ── Rails-specific ────────────────────────────────────────────────────────────

Rails/Output:
  Enabled: true

Rails/FindEach:
  Enabled: true

Rails/NotNullColumn:
  Enabled: true
